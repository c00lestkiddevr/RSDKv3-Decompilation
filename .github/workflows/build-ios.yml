name: Build RSDKv3 iOS

on:
  workflow_dispatch: # Allows you to start the build manually

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Mandated by RSDKv3 to pull dependencies

    - name: Set up Xcode version
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Compile Application
      run: |
        xcodebuild -project RSDKv3.xcodeproj -scheme RSDKv3 -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

    - name: Create Unsigned IPA Package
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/RSDKv3.app Payload/
        zip -r RSDKv3-unsigned.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/artifacts@v4
      with:
        name: RSDKv3-iOS-IPA
        path: RSDKv3-unsigned.ipa
